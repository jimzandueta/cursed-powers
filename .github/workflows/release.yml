name: "Release Pipeline"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web

jobs:
  validate:
    name: "Pre-Release Validation"
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: "test-key-release"
      OPENAI_API_KEY: "test-key-release"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npx turbo build

      - name: Run all unit tests
        run: npx turbo test

      - name: Type checking
        run: npx turbo typecheck


  genie-approval:
    name: "Genie Approval"
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Consult the genie
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║                                                          ║"
          echo "║   🧞 GENIE RELEASE APPROVAL BOARD                       ║"
          echo "║                                                          ║"
          echo "║   Release:  ${{ github.ref_name }}                       ║"
          echo "║   Status:   APPROVED ✅                                  ║"
          echo "║                                                          ║"
          echo "║   The genie has reviewed this release and finds it       ║"
          echo "║   adequately cursed. All wishes will be ruined as        ║"
          echo "║   intended. The monkey's paw is satisfied.               ║"
          echo "║                                                          ║"
          echo "║   Board Members Present:                                 ║"
          echo "║   - Chief Curse Officer (CCO)         ✍️  Approved       ║"
          echo "║   - VP of Wish Destruction            ✍️  Approved       ║"
          echo "║   - Director of Teapot Compliance     ✍️  Approved       ║"
          echo "║   - Senior Lamp Rubbing Engineer      ✍️  Approved       ║"
          echo "║                                                          ║"
          echo "║   \"I've been granting cursed wishes for 10,000 years.\"   ║"
          echo "║   \"This release is up to my exacting standards.\"         ║"
          echo "║                                               — Genie    ║"
          echo "║                                                          ║"
          echo "╚══════════════════════════════════════════════════════════╝"


  build-api:
    name: "Build API Image"
    runs-on: ubuntu-latest
    needs: [genie-approval]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: "Build Web Image"
    runs-on: ubuntu-latest
    needs: [genie-approval]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  release:
    name: "Create Release"
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## 🧞 Cursed Powers ${{ github.ref_name }}

            Another release of enterprise-grade cursed wish generation.

            ### Docker Images
            ```
            docker pull ${{ env.API_IMAGE }}:${{ github.ref_name }}
            docker pull ${{ env.WEB_IMAGE }}:${{ github.ref_name }}
            ```

            ### What's Cursed
            See the auto-generated changelog below for a summary of all the new
            ways we've found to disappoint wish-makers.

            ---
            *Approved by the Genie Release Approval Board*
            *HTCPCP-Compliant since 2026*
